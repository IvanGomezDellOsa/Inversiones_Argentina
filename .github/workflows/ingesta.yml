name: Ingesta semanal

on:
  schedule:
    - cron: '0 10 * * 1'  # Todos los lunes a las 10:00 UTC (07:00 AM Argentina)
  workflow_dispatch:        # Permite apretar un botón "Run workflow" manualmente en GitHub

jobs:
  ingesta:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install -r api/requirements.txt
        
      - name: Ejecutar script de ingesta (Apify + Gemini + pgvector)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
        run: python api/ingesta.py
