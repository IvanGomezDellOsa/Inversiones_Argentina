name: Flujo de ingesta cada 72hs

on:
  schedule:
    - cron: '0 4 */3 * *'  # Cada 3 días a las 04:00 UTC (01:00 AM Argentina) - Horario de menor tráfico global
  workflow_dispatch:        # Permite apretar un botón "Run workflow" manualmente en GitHub

jobs:
  ingesta:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Instalar dependencias
        run: pip install -r api/requirements.txt
        
      - name: Ejecutar script de ingesta (Apify + Gemini + pgvector)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python api/ingesta.py
 